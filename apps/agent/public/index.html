<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Agent</title>
    <style>
      *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
      body { background: #0f0f0f; }

      /* Markdown rendering inside chat bubbles */
      .md > :first-child { margin-top: 0; }
      .md > :last-child  { margin-bottom: 0; }
      .md p              { margin: 0.4em 0; line-height: 1.55; }
      .md h1, .md h2, .md h3, .md h4, .md h5, .md h6 {
        margin: 0.8em 0 0.3em; font-weight: 600; color: #fff; line-height: 1.3;
      }
      .md h1 { font-size: 1.15rem; }
      .md h2 { font-size: 1.05rem; }
      .md h3 { font-size: 0.98rem; }
      .md h4, .md h5, .md h6 { font-size: 0.92rem; }
      .md ul, .md ol     { margin: 0.4em 0 0.4em 1.4em; padding: 0; }
      .md li             { margin: 0.15em 0; }
      .md a              { color: #6ea8fe; text-decoration: underline; }
      .md a:hover        { color: #9bc4ff; }
      .md code           {
        background: #111; border: 1px solid #2a2a2a; border-radius: 3px;
        padding: 1px 5px; font-family: ui-monospace, SFMono-Regular, Menlo, monospace;
        font-size: 0.85em;
      }
      .md pre            {
        background: #0d0d0d; border: 1px solid #2a2a2a; border-radius: 4px;
        padding: 8px 10px; margin: 0.5em 0; overflow-x: auto;
        font-family: ui-monospace, SFMono-Regular, Menlo, monospace;
        font-size: 0.8rem; line-height: 1.45;
      }
      .md pre code       { background: none; border: 0; padding: 0; font-size: inherit; }
      .md blockquote     {
        margin: 0.5em 0; padding: 2px 10px; color: #aaa;
        border-left: 3px solid #444; background: #161616;
      }
      .md hr             { margin: 0.8em 0; border: 0; border-top: 1px solid #2a2a2a; }
      .md table          { border-collapse: collapse; margin: 0.5em 0; font-size: 0.85rem; }
      .md th, .md td     { border: 1px solid #2a2a2a; padding: 4px 8px; text-align: left; }
      .md th             { background: #1a1a1a; }
      .md img            { max-width: 100%; border-radius: 4px; }
      .md strong         { color: #fff; }
      .md em             { color: #ddd; }
    </style>
  </head>
  <body>
    <div id="root"></div>
    <script type="module" src="/chat.js"></script>
  </body>
</html>
